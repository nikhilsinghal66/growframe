<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Growframe logo presentation</title>
  <desc id="desc">Premium black background presentation for the Growframe identity.</desc>
  <rect width="1440" height="960" fill="#0A0A0A"/>
  <rect width="1440" height="960" fill="url(#ambient)"/>
  <path d="M0 760H1440" stroke="url(#divider)" stroke-opacity="0.35"/>
  <g transform="translate(484 274)">
    <rect width="472" height="316" rx="48" fill="#0D0D0D" stroke="url(#panelEdge)" stroke-width="1.5"/>
    <g transform="translate(174 52)">
      <rect width="124" height="124" rx="28" fill="#0A0A0A"/>
      <rect x="9" y="9" width="106" height="106" rx="24" fill="url(#surface)" stroke="url(#edge)" stroke-width="1.5"/>
      <path d="M80 35H55C42.2975 35 32 45.2975 32 58V66C32 78.7025 42.2975 89 55 89H78C87.9411 89 96 80.9411 96 71V62H65" stroke="url(#silver)" stroke-width="9.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M96 35H65M65 35V89M65 62H90" stroke="url(#violetSilver)" stroke-width="9.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M45 105H81" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
    </g>
    <text x="236" y="222" text-anchor="middle" font-family="Inter, Geist, Arial, sans-serif" font-size="58" font-weight="650" fill="#F5F5F5" letter-spacing="0">Growframe</text>
    <text x="236" y="260" text-anchor="middle" font-family="Inter, Geist, Arial, sans-serif" font-size="14" font-weight="500" fill="#71717A" letter-spacing="4.8">CREATOR GROWTH SYSTEMS</text>
  </g>
  <text x="720" y="807" text-anchor="middle" font-family="Inter, Geist, Arial, sans-serif" font-size="18" font-weight="500" fill="#71717A" letter-spacing="3.6">MINIMAL · CINEMATIC · SOFTWARE-GRADE</text>
  <defs>
    <radialGradient id="ambient" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(720 160) rotate(90) scale(540 720)">
      <stop stop-color="#7C3AED" stop-opacity="0.18"/>
      <stop offset="0.42" stop-color="#7C3AED" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="divider" x1="320" y1="760" x2="1120" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0"/>
      <stop offset="0.5" stop-color="white"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="panelEdge" x1="236" y1="0" x2="236" y2="316" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.14"/>
      <stop offset="1" stop-color="white" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="surface" x1="62" y1="9" x2="62" y2="115" gradientUnits="userSpaceOnUse">
      <stop stop-color="#171717"/>
      <stop offset="1" stop-color="#0D0D0D"/>
